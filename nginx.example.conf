server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;
    root /var/www/wiki;
    index index.php;
    charset utf-8;
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    location ~ /\. {
        deny all;
    }
    location ~ ^/(users|history|content|cache)/ {
        deny all;
    }
    location = /wikiwikiwiki {
        deny all;
    }
    location ~ ^/wikiwikiwiki/(?!assets(?:/|$)) {
        deny all;
    }
    location ~ ^/themes/[^/]+/(?!assets(?:/|$)) {
        deny all;
    }
    location ~ ^/config\.php$ {
        deny all;
    }
    location ~ ^/(composer\.json|composer\.lock)$ {
        deny all;
    }
    location ~ \.php$ {
        deny all;
    }
    location ~ ^/wikiwikiwiki/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~ ^/themes/[^/]+/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location / {
        try_files /index.php?$query_string =404;
    }
    location = /index.php {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }
    gzip on;
    gzip_types text/html text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
